<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle, #14001f, #000);
  color: white;
}

/* Background magic (AMAN) */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('https://i.ibb.co/6yZQG6F/stars.png');
  opacity: 0.2;
  pointer-events: none;
}

.container {
  padding: 15px;
  max-width: 500px;
  margin: auto;
}

/* TITLE */
h1 {
  text-align: center;
  color: #d580ff;
  margin-bottom: 5px;
}

.subtitle {
  text-align: center;
  color: #caa6ff;
  font-style: italic;
  margin-bottom: 15px;
}

/* SEARCH */
input {
  width: 100%;
  padding: 12px;
  border-radius: 15px;
  border: none;
  margin-bottom: 15px;
}

/* CARD */
.card {
  padding: 15px;
  margin-bottom: 10px;
  border-radius: 15px;
  border: 1px solid purple;
  background: rgba(255,255,255,0.05);
  cursor: pointer;
  transition: 0.2s;
}

.card:active {
  transform: scale(0.96);
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  bottom: 0;
  width: 100%;
  height: 100%;
  background: #0a0014;
}

.modal-content {
  padding: 20px;
}

.close {
  color: red;
  cursor: pointer;
  margin-bottom: 10px;
  display: inline-block;
}
</style>
</head>

// RENDER LIST
function renderList(data) {
  let list = document.getElementById("list");
  list.innerHTML = "";

}

// MODAL
function openModal(nama, umur, hobi, cita) {
  document.getElementById("modal").style.display = "block";
  document.getElementById("nama").innerText = nama;
  document.getElementById("umur").innerText = umur;
  document.getElementById("hobi").innerText = hobi;
  document.getElementById("cita").innerText = cita;
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

// SEARCH
function searchName() {
  let input = document.getElementById("search").value.toLowerCase();
  let filtered = siswa.filter(s => s.nama.toLowerCase().includes(input));
  renderList(filtered);
}
